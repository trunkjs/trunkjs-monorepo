name: Publish Tags

on:
  push:
    tags:
      - '*@*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  main:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org/
          scope: '@trunkjs'

      - run: npm install -g npm@latest
      - run: npm ci
      - run: npx nx report

      - name: Extract tagged package
        id: pkg
        shell: bash
        run: echo "name=${GITHUB_REF_NAME%@*}" >> "$GITHUB_OUTPUT"

      - run: npx nx run-many -p ${{ steps.pkg.outputs.name }} -t test build

      - run: npx nx release publish --access public -p ${{ steps.pkg.outputs.name }} --provenance
